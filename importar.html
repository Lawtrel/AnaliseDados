<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importar CSV - Scopus</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="global.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        .upload-area {
            border: 2px dashed #cbd5e1; border-radius: 1rem; padding: 3rem 2rem;
            text-align: center; background: #f8fafc; transition: all 0.2s;
            margin-bottom: 2rem;
        }
        .upload-area:hover { border-color: var(--pico-primary); background: #f1f5f9; }
        .upload-icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
        .progress-container { margin-top: 1.5rem; display: none; }
    </style>
</head>
<body>
    <nav class="container top-nav">
        <ul>
            <li><strong>Analytics Hub</strong></li>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="artigos.html">Artigos</a></li>
            <li><a href="importar.html" style="color: var(--pico-primary)">Importar</a></li>
        </ul>
    </nav>

    <main class="container" style="max-width: 700px; padding-top: 2rem;">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 0.5rem;">📥 Importação de Dataset</h2>
            <p style="text-align: center; color: #64748b; margin-bottom: 2rem;">Carregue o arquivo CSV extraído diretamente do Scopus</p>
            
            <div class="upload-area">
                <span class="upload-icon">📄</span>
                <input type="file" id="csv-file" accept=".csv" style="margin: 0 auto; max-width: 300px; display: block;" />
            </div>

            <button id="import-btn" style="width: 100%; font-size: 1.1rem; padding: 1rem;">Iniciar Sincronização de Dados</button>
            
            <div class="progress-container" id="progress-container">
                <label id="status-text" style="font-weight: 600; color: var(--pico-primary); text-align: center; display: block;">Preparando arquivo...</label>
                <progress id="progress-bar" value="0" max="100" style="margin-top: 0.5rem;"></progress>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabaseClient, showToast } from './supabase-client.js';

        document.getElementById('import-btn').addEventListener('click', () => {
            const file = document.getElementById('csv-file').files[0];
            if (!file) {
                showToast("Por favor, selecione um arquivo CSV primeiro.", "error");
                return;
            }

            const btn = document.getElementById('import-btn');
            const status = document.getElementById('status-text');
            const progress = document.getElementById('progress-bar');
            const progressContainer = document.getElementById('progress-container');
            
            btn.setAttribute('aria-busy', 'true');
            btn.disabled = true;
            progressContainer.style.display = 'block';
            status.innerText = "Lendo arquivo localmente...";

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: async function(results) {
                    const data = results.data;
                    progress.max = data.length;
                    status.innerText = `Iniciando gravação de ${data.length} registros (Não feche a aba)...`;

                    for (let i = 0; i < data.length; i++) {
                        const row = data[i];
                        if (!row.Title) continue; 
                        
                        progress.value = i + 1;
                        status.innerText = `Processando linha ${i+1} de ${data.length}...`;

                        try {
                            // 1. INSERIR ARTIGO
                            const { data: artData, error: artErr } = await supabaseClient.from('Article').insert({
                                Title: row['Title'] || null,
                                Year: parseInt(row['Year']) || null,
                                Source_Title: row['Source title'] || null,
                                Quotation: parseInt(row['Cited by']) || 0,
                                DOI: row['DOI'] || null,
                                Link: row['Link'] || null,
                                Abstract: row['Abstract'] || null,
                                ISSN: row['ISSN'] || null,
                                ISBN: row['ISBN'] || null,
                                Language: row['Language of Original Document'] || null,
                                Document_Type: row['Document Type'] || null,
                                Access_Type: row['Open Access'] || null
                            }).select();
                            
                            if (artErr || !artData) continue;
                            const articleId = artData[0].ID;

                            // 2. AUTORES
                            if (row['Author(s) ID']) {
                                const ids = row['Author(s) ID'].split(';').map(s => s.trim());
                                const names = (row['Authors'] || '').split(';').map(s => s.trim());
                                const fullNames = (row['Author full names'] || '').split(';').map(s => s.trim());

                                for (let j = 0; j < ids.length; j++) {
                                    if (!ids[j]) continue;
                                    await supabaseClient.from('Author').upsert({ ID: ids[j], Name: names[j] || null, Full_Name: fullNames[j] || null });
                                    await supabaseClient.from('Article_Author').insert({ ID_Article: articleId, ID_Author: ids[j] });
                                }
                            }

                            // 3. PALAVRAS-CHAVE
                            let kws = [];
                            if (row['Author Keywords']) kws.push(...row['Author Keywords'].split(';').map(s => s.trim().toLowerCase()));
                            if (row['Index Keywords']) kws.push(...row['Index Keywords'].split(';').map(s => s.trim().toLowerCase()));

                            for (let kw of kws) {
                                if (!kw) continue;
                                let { data: kwData } = await supabaseClient.from('Keyword').select('ID').eq('Keyword', kw);
                                let kwId;
                                if (kwData && kwData.length > 0) {
                                    kwId = kwData[0].ID;
                                } else {
                                    let { data: newKw } = await supabaseClient.from('Keyword').insert({ Keyword: kw }).select();
                                    if (newKw) kwId = newKw[0].ID;
                                }
                                if (kwId) await supabaseClient.from('Article_keyword').insert({ ID_Article: articleId, ID_Keyword: kwId });
                            }
                        } catch (e) {
                            console.error(`Erro na linha ${i}:`, e);
                        }
                    }
                    
                    status.innerText = "✅ Importação Concluída com Sucesso!";
                    showToast("Dados importados e normalizados no banco!", "success");
                    btn.removeAttribute('aria-busy');
                    btn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
